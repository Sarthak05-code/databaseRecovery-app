<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Database Backup & Restore Hub</title>
        <!-- Tailwind CSS Play CDN -->
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <!-- Header -->
            <header
                class="mb-8 flex items-center justify-between border-b border-slate-200 pb-5"
            >
                <div>
                    <h1
                        class="text-3xl font-bold tracking-tight text-slate-900"
                    >
                        Database Operations Control
                    </h1>
                    <p class="text-sm text-slate-500 mt-1">
                        Full-stack MySQL orchestration engine wrapper running
                        securely on Go v1.x
                    </p>
                </div>
                <div
                    class="flex items-center gap-2 bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full text-xs font-semibold border border-emerald-200 shadow-sm"
                >
                    <span
                        class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"
                    ></span>
                    Backend System Connected
                </div>
            </header>

            <!-- Main Workspace Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left Column: Global Configuration Form -->
                <div class="lg:col-span-2 space-y-6">
                    <div
                        class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"
                    >
                        <h2
                            class="text-lg font-semibold text-slate-900 mb-4 flex items-center gap-2"
                        >
                            <svg
                                class="w-5 h-5 text-indigo-500"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                                ></path>
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                ></path>
                            </svg>
                            Target Environment Settings
                        </h2>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="host"
                                    >Database Host</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="text"
                                    id="host"
                                    value="localhost"
                                />
                            </div>
                            <div class="flex flex-col">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="port"
                                    >Database Port</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="text"
                                    id="port"
                                    value="3306"
                                />
                            </div>
                            <div class="flex flex-col">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="user"
                                    >Username</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="text"
                                    id="user"
                                    placeholder="e.g. root"
                                />
                            </div>
                            <div class="flex flex-col">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="password"
                                    >Password</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="password"
                                    id="password"
                                    placeholder="••••••••"
                                />
                            </div>
                            <div class="flex flex-col md:col-span-2">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="dbname"
                                    >Database Name Schema</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono text-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="text"
                                    id="dbname"
                                    placeholder="e.g. shop_db"
                                />
                            </div>
                        </div>
                    </div>

                    <!-- Path & Alert Integrations Card -->
                    <div
                        class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"
                    >
                        <h3
                            class="text-md font-semibold text-slate-900 mb-4 flex items-center gap-2"
                        >
                            <svg
                                class="w-5 h-5 text-indigo-500"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2m-4-1v8m0 0l3-3m-3 3L9 8m-5 5h2.586a1 1 0 01.707.293l2.414 2.414a1 1 0 00.707.293h3.172a1 1 0 00.707-.293l2.414-2.414a1 1 0 01.707-.293H20"
                                ></path>
                            </svg>
                            Storage Options & Alert Routing
                        </h3>
                        <div class="space-y-4">
                            <div class="flex flex-col">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="storageDir"
                                    >Local Server Target Storage Path</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="text"
                                    id="storageDir"
                                    value="./backups"
                                />
                            </div>
                            <div class="flex flex-col">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="backupFilePath"
                                    >Target Recovery Asset File Path (Required
                                    for Restore)</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="text"
                                    id="backupFilePath"
                                    placeholder="e.g. ./backups/shop_db_20260719_183501.sql.gz"
                                />
                            </div>
                            <div class="flex flex-col">
                                <label
                                    class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
                                    for="slackWebhook"
                                    >Optional Slack App Webhook URL</label
                                >
                                <input
                                    class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition"
                                    type="text"
                                    id="slackWebhook"
                                    placeholder="https://hooks.slack.com/services/... "
                                />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Interactive Actions & System Logs -->
                <div class="space-y-6">
                    <!-- Action Hub Panel -->
                    <div
                        class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"
                    >
                        <h2 class="text-lg font-semibold text-slate-900 mb-4">
                            Command Actions
                        </h2>
                        <div class="flex flex-col gap-3">
                            <button
                                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-sm active:scale-[0.99] transition flex items-center justify-center gap-2"
                                onclick="triggerAction('/api/backup')"
                            >
                                <svg
                                    class="w-4 h-4"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
                                    ></path>
                                </svg>
                                Run Backup Engine
                            </button>
                            <button
                                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-sm active:scale-[0.99] transition flex items-center justify-center gap-2"
                                onclick="triggerAction('/api/restore')"
                            >
                                <svg
                                    class="w-4 h-4"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                                    ></path>
                                </svg>
                                Run Restore Engine
                            </button>
                        </div>
                    </div>

                    <!-- Console Output Card -->
                    <div
                        class="bg-slate-900 rounded-xl shadow-md border border-slate-950 overflow-hidden flex flex-col"
                    >
                        <div
                            class="bg-slate-950 px-4 py-2.5 flex items-center justify-between border-b border-slate-800"
                        >
                            <div class="flex items-center gap-1.5">
                                <span
                                    class="w-2.5 h-2.5 rounded-full bg-red-500"
                                ></span>
                                <span
                                    class="w-2.5 h-2.5 rounded-full bg-yellow-500"
                                ></span>
                                <span
                                    class="w-2.5 h-2.5 rounded-full bg-green-500"
                                ></span>
                            </div>
                            <span
                                class="text-xs font-mono text-slate-500 select-none"
                                >system_activity.log</span
                            >
                        </div>
                        <div
                            class="p-4 font-mono text-xs text-emerald-400 min-h-[220px] max-h-[400px] overflow-y-auto leading-relaxed whitespace-pre-wrap break-all"
                            id="outputLog"
                        >
                            Ready. Awaiting operational execution directive...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
